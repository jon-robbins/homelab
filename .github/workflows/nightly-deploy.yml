name: Nightly Deploy

on:
  schedule:
    - cron: "0 0 * * *" # midnight UTC = 2 AM CEST
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    permissions:
      contents: write
      issues: write
    defaults:
      run:
        shell: bash

    env:
      DEPLOY_DIR: /home/jon/homelab
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      HOMELAB_BOT_TOKEN: ${{ secrets.HOMELAB_BOT_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: dev
          fetch-depth: 0
          # Use a PAT so `git push` can update workflow files on `main`.
          token: ${{ secrets.HOMELAB_BOT_TOKEN }}

      - name: Configure git identity (for rollback commits)
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Check for new commits
        id: check
        run: |
          git fetch origin main
          DEV_SHA=$(git rev-parse origin/dev)
          MAIN_SHA=$(git rev-parse origin/main)
          if [ "$DEV_SHA" = "$MAIN_SHA" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "No new commits on dev since last merge. Skipping."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "origin/main and origin/dev differ. Proceeding with deploy."
          fi

      - name: Check validate status on dev
        if: steps.check.outputs.skip != 'true'
        run: |
          # Poll for up to 10 minutes until the latest CI run on dev has a non-empty conclusion.
          # This avoids a race where the latest run is still in_progress, yielding an empty result.
          timeout=$(( SECONDS + 600 ))
          RESULT=""
          while (( SECONDS < timeout )); do
            RESULT=$(gh run list --branch dev --workflow ci.yml --limit 1 --json conclusion --jq '.[0].conclusion')
            if [[ -n "$RESULT" && "$RESULT" != "null" ]]; then
              break
            fi
            echo "Latest CI run on dev still in progress; waiting 30s... ($(( timeout - SECONDS ))s left)"
            sleep 30
          done

          if [[ -z "$RESULT" || "$RESULT" == "null" ]]; then
            echo "::error::Timed out waiting for the latest CI run on dev to complete."
            gh issue create \
              --title "Nightly deploy skipped: CI still running on dev" \
              --body "$(cat <<EOF
          The latest CI validate run on \`dev\` did not finish within 10 minutes.
          Check whether CI is stuck or unexpectedly slow.
          EOF
          )" || echo "::warning::Could not create GitHub issue (network or API)."
            exit 1
          fi

          if [ "$RESULT" != "success" ]; then
            echo "::error::Latest CI validate on dev has status '$RESULT'. Skipping deploy."
            gh issue create \
              --title "Nightly deploy skipped: validate failing on dev" \
              --body "$(cat <<EOF
          The latest CI validate run on \`dev\` has conclusion \`$RESULT\`.
          Fix validation errors on \`dev\` before the next nightly deploy.
          EOF
          )" || echo "::warning::Could not create GitHub issue (network or API)."
            exit 1
          fi
          echo "Latest validate on dev passed."

      - name: Merge dev into main
        if: steps.check.outputs.skip != 'true'
        id: merge
        run: |
          set -euo pipefail
          PREV_SHA=$(git rev-parse origin/main)
          echo "prev_sha=$PREV_SHA" >> "$GITHUB_OUTPUT"

          git fetch origin main dev
          git checkout -B main origin/main

          # Always --no-ff so each deploy is a single merge commit. Rollback uses
          # `git revert -m 1` (works on protected main); force-push is often blocked.
          git merge origin/dev --no-ff -m "chore(deploy): merge dev into main (nightly)"
          parent_count="$(git rev-list --parents -n 1 HEAD | awk '{print NF}')"
          if [[ "${parent_count}" -lt 3 ]]; then
            echo "::error::Merge did not produce a merge commit (parents=${parent_count}). Refusing push."
            exit 1
          fi

          git push origin main
          echo "merged_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "Merged dev into main (prev: $PREV_SHA, new: $(git rev-parse HEAD))"

      # Everything below mutates $DEPLOY_DIR / Docker only after merge + push succeed.
      # If merge fails, the job stops here and production keeps running the previous revision.

      - name: Update production directory
        if: steps.check.outputs.skip != 'true' && steps.merge.conclusion == 'success'
        run: |
          cd "$DEPLOY_DIR"
          git fetch "https://x-access-token:${GH_TOKEN}@github.com/jon-robbins/homelab.git" main
          git checkout main 2>/dev/null || true
          git reset --hard FETCH_HEAD

      - name: Pre-flight backup of data
        if: steps.check.outputs.skip != 'true' && steps.merge.conclusion == 'success'
        working-directory: /home/jon/homelab
        run: |
          set -euo pipefail
          # Ensure backup destination exists and is writable (MEDIA_HDD_PATH/backups).
          if [[ -f .env ]]; then
            set -a
            # shellcheck source=/dev/null
            source .env
            set +a
          fi
          DEST_DRIVE="${MEDIA_HDD_PATH:-/mnt/media-hdd}"
          BACKUP_DIR="${DEST_DRIVE}/backups/homelab-data"
          if [[ ! -d "${BACKUP_DIR}" ]]; then
            if command -v sudo >/dev/null 2>&1 && sudo -n true 2>/dev/null; then
              sudo mkdir -p "${BACKUP_DIR}"
              sudo chown "$(id -u):$(id -g)" "${DEST_DRIVE}/backups" "${BACKUP_DIR}" || true
            else
              mkdir -p "${BACKUP_DIR}" || true
            fi
          fi
          if [[ ! -w "${BACKUP_DIR}" ]]; then
            echo "::error::Backup dir is not writable: ${BACKUP_DIR}. Fix ownership/permissions on ${DEST_DRIVE}/backups."
            exit 1
          fi
          bash scripts/backup-data.sh

      - name: Deploy
        if: steps.check.outputs.skip != 'true' && steps.merge.conclusion == 'success'
        working-directory: /home/jon/homelab
        run: |
          set -euo pipefail
          source .env 2>/dev/null || true
          # local/caddy-cf and other :local tags are not on a registry; do not fail the deploy.
          docker compose pull --ignore-pull-failures
          docker compose up -d --build

      - name: Wait for healthchecks
        if: steps.check.outputs.skip != 'true' && steps.merge.conclusion == 'success'
        working-directory: /home/jon/homelab
        run: |
          set -euo pipefail
          # Only these services can fail the health gate.
          # Names match the container suffix after stripping homelab- prefix and -1 suffix.
          REQUIRED_SERVICES=(caddy media-agent flaresolverr jellyfin plex overseerr internal-dashboard cloudflared dashy openclaw-gateway qbittorrent prowlarr sonarr radarr readarr)

          is_required() {
            local name="$1"
            for svc in "${REQUIRED_SERVICES[@]}"; do
              if [[ "$name" == *"$svc"* ]]; then return 0; fi
            done
            return 1
          }

          echo "Waiting up to 300s for required services to settle..."
          deadline=$(( SECONDS + 300 ))
          while (( SECONDS < deadline )); do
            any_starting=false
            for c in $(docker compose ps --format '{{.Name}}'); do
              status=$(docker inspect --format='{{.State.Health.Status}}' "$c" 2>/dev/null || echo "none")
              if [[ "$status" == "starting" ]] && is_required "$c"; then
                any_starting=true
                break
              fi
            done
            $any_starting || break
            echo "  waiting... ($((deadline - SECONDS))s left)"
            sleep 10
          done

          failed=0
          for c in $(docker compose ps --format '{{.Name}}'); do
            status=$(docker inspect --format='{{.State.Health.Status}}' "$c" 2>/dev/null || echo "none")
            if [[ "$status" == "unhealthy" || "$status" == "starting" ]]; then
              if is_required "$c"; then
                echo "FAIL: $c ($status) — required service"
                docker inspect --format='{{json .State.Health}}' "$c" 2>/dev/null || true
                failed=$(( failed + 1 ))
              else
                echo "WARN: $c ($status) — non-required service"
                docker inspect --format='{{json .State.Health}}' "$c" 2>/dev/null || true
              fi
            else
              echo "OK: $c ($status)"
            fi
          done
          (( failed == 0 ))

      - name: Run E2E tests
        if: steps.check.outputs.skip != 'true' && steps.merge.conclusion == 'success'
        working-directory: /home/jon/homelab
        run: |
          set -euo pipefail
          bash tests/integration/router-smoke-p0.sh
          bash tests/integration/media-pipeline-e2e.sh
          bash tests/integration/llm-pipeline-e2e.sh
          python3 tests/integration/llm_behavior_check.py

      - name: Rollback on failure
        if: failure() && steps.merge.outputs.merged_sha != ''
        run: |
          set -euo pipefail
          MERGED="${{ steps.merge.outputs.merged_sha }}"
          PREV_SHA="${{ steps.merge.outputs.prev_sha }}"
          echo "Deploy or E2E failed. Reverting merge ${MERGED} on main (revert -m 1; no force-push)..."

          git checkout main
          git fetch origin main
          git checkout -B main origin/main
          git revert -m 1 "${MERGED}" --no-edit || {
            echo "Revert produced no change; restoring tree from pre-merge state..."
            TREE=$(git rev-parse "${PREV_SHA}^{tree}")
            RESTORE=$(git commit-tree "$TREE" -p HEAD -m "chore(rollback): restore tree to pre-merge state")
            git update-ref refs/heads/main "$RESTORE"
          }
          git push origin main

          cd "$DEPLOY_DIR"
          git fetch "https://x-access-token:${GH_TOKEN}@github.com/jon-robbins/homelab.git" main
          git reset --hard FETCH_HEAD

          source .env 2>/dev/null || true
          docker compose up -d --build

          echo "Rollback complete."

      - name: Create failure issue
        if: failure() && steps.merge.outputs.prev_sha != ''
        run: |
          set -euo pipefail
          FAILED_SHA="${{ steps.merge.outputs.merged_sha }}"
          if [[ -z "${FAILED_SHA}" ]]; then
            FAILED_SHA="unknown (merge may not have completed push)"
          fi
          gh issue create \
            --title "Nightly deploy failed: auto-rolled back" \
            --body "$(cat <<EOF
          The nightly deploy at $(date -u +%Y-%m-%dT%H:%M:%SZ) failed and was automatically rolled back.

          **Failed revision (merge commit):** \`${FAILED_SHA}\`
          **Pre-merge main tip:** \`${{ steps.merge.outputs.prev_sha }}\` (rollback is \`git revert -m 1\` of the merge; no force-push)
          **Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          Check the workflow logs above for details on which step failed (healthcheck or E2E).
          EOF
          )" || echo "::warning::Could not create GitHub issue (network or API)."
