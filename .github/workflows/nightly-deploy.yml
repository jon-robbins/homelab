name: Nightly Deploy

on:
  schedule:
    - cron: "0 0 * * *" # midnight UTC = 2 AM CEST
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    permissions:
      contents: write
      issues: write
    defaults:
      run:
        shell: bash

    env:
      DEPLOY_DIR: /home/jon/homelab
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      HOMELAB_BOT_TOKEN: ${{ secrets.HOMELAB_BOT_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: dev
          fetch-depth: 0
          # Use a PAT so `git push` can update workflow files on `main`.
          token: ${{ secrets.HOMELAB_BOT_TOKEN }}

      - name: Configure git identity (for rollback commits)
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Check for new commits
        id: check
        run: |
          git fetch origin main
          DEV_SHA=$(git rev-parse origin/dev)
          MAIN_SHA=$(git rev-parse origin/main)
          if [ "$DEV_SHA" = "$MAIN_SHA" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "No new commits on dev since last merge. Skipping."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "origin/main and origin/dev differ. Proceeding with deploy."
          fi

      - name: Check validate status on dev
        if: steps.check.outputs.skip != 'true'
        run: |
          # Poll CI status — wait up to 10 minutes for a completed run
          elapsed=0
          while (( elapsed < 600 )); do
            RESULT=$(gh run list --branch dev --workflow ci.yml --limit 1 \
              --json status,conclusion \
              -q '.[0].conclusion // "pending"')
            # null / empty / pending / in_progress → still running, keep waiting
            if [[ -z "$RESULT" || "$RESULT" == "null" || "$RESULT" == "pending" ]]; then
              echo "CI still running (status=$RESULT). Waiting 30s... (${elapsed}s elapsed)"
              sleep 30
              elapsed=$(( elapsed + 30 ))
              continue
            fi
            break
          done
          if [ "$RESULT" != "success" ]; then
            echo "::error::Latest CI validate on dev has status '$RESULT'. Skipping deploy."
            TITLE="Nightly deploy skipped: validate failing on dev"
            BODY="$(cat <<EOF
          The latest CI validate run on \`dev\` has conclusion \`$RESULT\`.
          Fix validation errors on \`dev\` before the next nightly deploy.
          EOF
          )"
            EXISTING="$(gh issue list --state open --search "in:title \"${TITLE}\"" --json number,title \
              --jq ".[] | select(.title == \"${TITLE}\") | .number" | head -n1 || true)"
            if [[ -n "${EXISTING}" ]]; then
              gh issue comment "${EXISTING}" --body "${BODY}" \
                || echo "::warning::Could not comment on existing issue #${EXISTING}."
            else
              gh issue create --title "${TITLE}" --body "${BODY}" \
                || echo "::warning::Could not create GitHub issue (network or API)."
            fi
            exit 1
          fi
          echo "Latest validate on dev passed."

      - name: Merge dev into main
        if: steps.check.outputs.skip != 'true'
        id: merge
        run: |
          set -euo pipefail
          PREV_SHA=$(git rev-parse origin/main)
          echo "prev_sha=$PREV_SHA" >> "$GITHUB_OUTPUT"

          git fetch origin main dev
          git checkout -B main origin/main

          # Fast-forward when dev strictly extends main; otherwise histories diverged
          # (e.g. merge commits on dev, or main-only commits) and --ff-only would fail.
          if git merge-base --is-ancestor origin/main origin/dev; then
            git merge origin/dev --ff-only
            echo "Fast-forwarded main to origin/dev"
          else
            git merge origin/dev --no-ff -m "chore(deploy): merge dev into main (nightly)"
            echo "Merged origin/dev into main with a merge commit (branches had diverged)"
          fi

          git push origin main
          echo "merged_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "Merged dev into main (prev: $PREV_SHA, new: $(git rev-parse HEAD))"

      # Everything below mutates $DEPLOY_DIR / Docker only after merge + push succeed.
      # If merge fails, the job stops here and production keeps running the previous revision.

      - name: Update production directory
        if: steps.check.outputs.skip != 'true' && steps.merge.conclusion == 'success'
        run: |
          cd "$DEPLOY_DIR"
          git fetch "https://x-access-token:${GH_TOKEN}@github.com/jon-robbins/homelab.git" main
          git checkout main 2>/dev/null || true
          git reset --hard FETCH_HEAD

      - name: Pre-flight backup of data
        if: steps.check.outputs.skip != 'true' && steps.merge.conclusion == 'success'
        working-directory: /home/jon/homelab
        run: |
          set -euo pipefail
          # Ensure backup destination exists and is writable (MEDIA_HDD_PATH/backups).
          if [[ -f .env ]]; then
            set -a
            # shellcheck source=/dev/null
            source .env
            set +a
          fi
          DEST_DRIVE="${MEDIA_HDD_PATH:-/mnt/media-hdd}"
          BACKUP_DIR="${DEST_DRIVE}/backups/homelab-data"
          if [[ ! -d "${BACKUP_DIR}" ]]; then
            if command -v sudo >/dev/null 2>&1 && sudo -n true 2>/dev/null; then
              sudo mkdir -p "${BACKUP_DIR}"
              sudo chown "$(id -u):$(id -g)" "${DEST_DRIVE}/backups" "${BACKUP_DIR}" || true
            else
              mkdir -p "${BACKUP_DIR}" || true
            fi
          fi
          if [[ ! -w "${BACKUP_DIR}" ]]; then
            echo "::error::Backup dir is not writable: ${BACKUP_DIR}. Fix ownership/permissions on ${DEST_DRIVE}/backups."
            exit 1
          fi
          bash scripts/ops/backup-data.sh

      - name: Deploy
        if: steps.check.outputs.skip != 'true' && steps.merge.conclusion == 'success'
        working-directory: /home/jon/homelab
        run: |
          set -euo pipefail
          source .env 2>/dev/null || true
          # local/caddy-cf and other :local tags are not on a registry; do not fail the deploy.
          docker compose pull --ignore-pull-failures
          docker compose up -d --build

      - name: Wait for healthchecks
        if: steps.check.outputs.skip != 'true' && steps.merge.conclusion == 'success'
        working-directory: /home/jon/homelab
        run: |
          set -euo pipefail
          # Only block on critical services; non-critical/deprecated ones must not gate deploy
          CRITICAL_SERVICES=(
            caddy
            cloudflared
            plex
            jellyfin
            radarr
            sonarr
            prowlarr
            qbittorrent
            overseerr
            dashy
            ollama
          )

          echo "Waiting up to 300s for critical services to become healthy..."
          deadline=$(( SECONDS + 300 ))
          while (( SECONDS < deadline )); do
            all_ready=true
            for c in $(docker compose ps --format '{{.Name}}'); do
              # Skip containers not in the critical list
              is_critical=false
              for svc in "${CRITICAL_SERVICES[@]}"; do
                if [[ "$c" == *"$svc"* ]]; then
                  is_critical=true
                  break
                fi
              done
              $is_critical || continue

              status=$(docker inspect --format='{{.State.Health.Status}}' "$c" 2>/dev/null || echo "none")
              case "$status" in
                healthy|none) ;;
                *) all_ready=false ;;
              esac
            done
            $all_ready && break
            echo "  waiting... ($((deadline - SECONDS))s left)"
            sleep 10
          done

          failed=0
          for c in $(docker compose ps --format '{{.Name}}'); do
            # Only fail on unhealthy critical services
            is_critical=false
            for svc in "${CRITICAL_SERVICES[@]}"; do
              if [[ "$c" == *"$svc"* ]]; then
                is_critical=true
                break
              fi
            done

            status=$(docker inspect --format='{{.State.Health.Status}}' "$c" 2>/dev/null || echo "none")
            if [[ "$status" == "unhealthy" ]]; then
              if $is_critical; then
                echo "FAIL: $c ($status) [CRITICAL]"
                docker inspect --format='{{json .State.Health}}' "$c" 2>/dev/null || true
                failed=$(( failed + 1 ))
              else
                echo "WARN: $c ($status) [non-critical, ignored]"
              fi
            else
              echo "OK: $c ($status)"
            fi
          done
          (( failed == 0 ))

      - name: Run E2E tests
        if: steps.check.outputs.skip != 'true' && steps.merge.conclusion == 'success'
        working-directory: /home/jon/homelab
        run: |
          set -euo pipefail
          bash tests/integration/media-pipeline-e2e.sh

      - name: Rollback on failure
        if: failure() && steps.merge.outputs.prev_sha != ''
        run: |
          set -euo pipefail
          merged_sha="${{ steps.merge.outputs.merged_sha }}"
          echo "Deploy or E2E failed. Reverting merge commit ${merged_sha}..."

          git checkout main
          git fetch origin main
          git reset --hard origin/main

          # Revert the merge commit (parent 1 = main before merge)
          git revert -m 1 "$merged_sha" --no-edit || {
            # Fallback for no-diff merges: create an empty revert commit via commit-tree
            tree=$(git rev-parse HEAD^{tree})
            revert_sha=$(git commit-tree "$tree" -p HEAD -m "Revert nightly merge $merged_sha (no-diff fallback)")
            git update-ref refs/heads/main "$revert_sha"
          }
          git push origin main

          # Update production directory to the reverted state
          cd "$DEPLOY_DIR"
          git fetch "https://x-access-token:${GH_TOKEN}@github.com/jon-robbins/homelab.git" main
          git reset --hard FETCH_HEAD

          # Redeploy the previous (working) version
          source .env 2>/dev/null || true
          docker compose up -d --build

          echo "Rollback complete."

      - name: Create or update failure issue
        if: failure() && steps.merge.outputs.prev_sha != ''
        run: |
          set -euo pipefail
          FAILED_SHA="${{ steps.merge.outputs.merged_sha }}"
          if [[ -z "${FAILED_SHA}" ]]; then
            FAILED_SHA="unknown (merge may not have completed push)"
          fi
          TITLE="Nightly deploy failed: auto-rolled back"
          BODY="$(cat <<EOF
          The nightly deploy at $(date -u +%Y-%m-%dT%H:%M:%SZ) failed and was automatically rolled back.

          **Failed revision:** \`${FAILED_SHA}\`
          **Rolled back to:** \`${{ steps.merge.outputs.prev_sha }}\`
          **Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          Check the workflow logs above for details on which step failed (healthcheck or E2E).
          EOF
          )"

          # Reuse an existing open issue with the same title instead of spawning duplicates.
          EXISTING="$(gh issue list --state open --search "in:title \"${TITLE}\"" --json number,title \
            --jq ".[] | select(.title == \"${TITLE}\") | .number" | head -n1 || true)"

          if [[ -n "${EXISTING}" ]]; then
            gh issue comment "${EXISTING}" --body "${BODY}" \
              || echo "::warning::Could not comment on existing issue #${EXISTING}."
            echo "Commented on existing issue #${EXISTING}."
          else
            gh issue create --title "${TITLE}" --body "${BODY}" \
              || echo "::warning::Could not create GitHub issue (network or API)."
          fi
