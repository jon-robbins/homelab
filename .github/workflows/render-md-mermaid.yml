name: render-md-mermaid

on:
  push:
    branches: [dev, main]
    paths:
      # Only README contains Mermaid; avoid scanning data/ and other .md (mermaid-cli parses every file).
      - "README.md"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  render-md-mermaid:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Render Mermaid diagrams in Markdown
        uses: nielsvaneck/render-md-mermaid@v3

      - name: Commit rendered SVG and PNG files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          # PNG optional; git add fails if a pathspec matches nothing (no .png today).
          file_pattern: "docs/images/*.svg"
          commit_message: "chore(docs): render Mermaid diagrams"
