name: CI

on:
  pull_request:
  push:
    branches:
      - dev

jobs:
  # ── Fast static validation (every push, no containers) ─────────────────────
  validate:
    runs-on: self-hosted
    permissions:
      contents: read
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compose config
        run: |
          set -euo pipefail
          ROOT="${GITHUB_WORKSPACE}"
          docker compose -f "${ROOT}/docker-compose.yml" config --quiet

      - name: Compose shell tests
        run: bash "${GITHUB_WORKSPACE}/tests/compose/run_tests.sh"

      - name: Create package venv and install deps
        run: |
          set -euo pipefail
          PKG_DIR="${GITHUB_WORKSPACE}/src/homelab_workers"
          python -m venv "${PKG_DIR}/.venv"
          "${PKG_DIR}/.venv/bin/pip" install -e "${PKG_DIR}[dev]"
          "${PKG_DIR}/.venv/bin/pip" install pydantic
          if [[ -d "${GITHUB_WORKSPACE}/media-agent" ]]; then
            "${PKG_DIR}/.venv/bin/pip" install -q -r "${GITHUB_WORKSPACE}/media-agent/requirements-dev.txt"
          fi

      - name: Workers pytest
        run: |
          "${GITHUB_WORKSPACE}/src/homelab_workers/.venv/bin/python" -m pytest -q "${GITHUB_WORKSPACE}/tests/workers"

      - name: Media agent pytest
        run: |
          if [[ -d "${GITHUB_WORKSPACE}/media-agent/tests" ]]; then
            "${GITHUB_WORKSPACE}/src/homelab_workers/.venv/bin/python" -m pytest -q "${GITHUB_WORKSPACE}/media-agent/tests"
          else
            echo "No media-agent/tests; skipping"
          fi

      - name: Package pytest
        run: |
          "${GITHUB_WORKSPACE}/src/homelab_workers/.venv/bin/python" -m pytest -q "${GITHUB_WORKSPACE}/src/homelab_workers/src/homelab_workers/tests"

      - name: Package ruff
        run: |
          "${GITHUB_WORKSPACE}/src/homelab_workers/.venv/bin/ruff" check \
            "${GITHUB_WORKSPACE}/src/homelab_workers/src" \
            "${GITHUB_WORKSPACE}/src/homelab_workers/src/homelab_workers/tests" \
            "${GITHUB_WORKSPACE}/tests/workers"

      - name: Media agent ruff
        run: |
          if [[ -d "${GITHUB_WORKSPACE}/media-agent/app" ]]; then
            "${GITHUB_WORKSPACE}/src/homelab_workers/.venv/bin/ruff" check \
              "${GITHUB_WORKSPACE}/media-agent/app" \
              "${GITHUB_WORKSPACE}/media-agent/tests"
          else
            echo "No media-agent/app; skipping"
          fi

      - name: Build local images
        run: |
          set -euo pipefail
          docker compose -f docker-compose.yml build

      - name: Bash syntax
        run: |
          set -euo pipefail
          shopt -s globstar nullglob
          scripts=(
            "${GITHUB_WORKSPACE}"/scripts/ci/*.sh
            "${GITHUB_WORKSPACE}"/scripts/ops/*.sh
            "${GITHUB_WORKSPACE}"/scripts/media/*.sh
            "${GITHUB_WORKSPACE}"/scripts/vpn/*.sh
            "${GITHUB_WORKSPACE}"/scripts/hardening/*.sh
            "${GITHUB_WORKSPACE}"/tests/compose/*.sh
            "${GITHUB_WORKSPACE}"/tests/runtime/*.sh
            "${GITHUB_WORKSPACE}"/tests/integration/*.sh
          )
          for script in "${scripts[@]}"; do
            [[ -f "${script}" ]] && bash -n "${script}" && echo "OK  ${script#${GITHUB_WORKSPACE}/}"
          done

      - name: README mermaid blocks
        run: |
          python3 <<'PY'
          from pathlib import Path
          import re
          import sys

          readme = Path("README.md")
          if not readme.exists():
              print("README.md missing", file=sys.stderr)
              sys.exit(1)

          content = readme.read_text(encoding="utf-8")
          count = len(re.findall(r"```mermaid", content))
          if count < 1:
              print("README must contain at least one mermaid block", file=sys.stderr)
              sys.exit(1)
          PY
