x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr@sha256:7962759d99d7e125e108e0f5e7f3cdbcd36161776d058d1d9b7153b92ef1af9e
    networks:
      - homelab_net
    security_opt: ["no-new-privileges:true"]
    cap_drop: [ALL]
    shm_size: "2gb"
    environment:
      - LOG_LEVEL=info
      - TZ=${TZ}
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8191/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    logging: *default-logging
    mem_limit: 2g
    pids_limit: 500

  prowlarr:
    image: lscr.io/linuxserver/prowlarr@sha256:c5de2a8758a05594319263e7691c1dce56899442ed1720d6eca216c0958f4caf
    networks:
      - homelab_net
    security_opt: ["no-new-privileges:true"]
    cap_drop: [ALL]
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ../data/prowlarr:/config
    labels:
      caddy: "${BASE_DOMAIN}"
      caddy.handle: "/prowlarr*"
      caddy.handle.0_reverse_proxy: "{{upstreams 9696}}"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9696/ping || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    logging: *default-logging
    pids_limit: 500

  sonarr:
    image: lscr.io/linuxserver/sonarr@sha256:3580aec3802c915f0f819a88d5099abce61734b925732b8393d176b5dc561020
    networks:
      - homelab_net
    security_opt: ["no-new-privileges:true"]
    cap_drop: [ALL]
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ../data/sonarr:/config
      - ${MEDIA_HDD_PATH:-/mnt/media-hdd}/TV:/tv
      - ${MEDIA_NVME_PATH:-/mnt/media-nvme}/Incoming:/downloads
    labels:
      caddy: "${BASE_DOMAIN}"
      caddy.handle: "/sonarr*"
      caddy.handle.0_reverse_proxy: "{{upstreams 8989}}"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8989/sonarr/ping || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    logging: *default-logging
    pids_limit: 500

  radarr:
    image: lscr.io/linuxserver/radarr@sha256:b01097ad2d948c9f5eca39eb60bb529e2e55b0738c4bf7db09383bef0abab59d
    networks:
      - homelab_net
    security_opt: ["no-new-privileges:true"]
    cap_drop: [ALL]
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ../data/radarr:/config
      - ${MEDIA_HDD_PATH:-/mnt/media-hdd}/Movies:/movies
      - ${MEDIA_NVME_PATH:-/mnt/media-nvme}/Incoming:/downloads
    labels:
      caddy: "${BASE_DOMAIN}"
      caddy.handle: "/radarr*"
      caddy.handle.0_reverse_proxy: "{{upstreams 7878}}"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:7878/radarr/ping || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    logging: *default-logging
    pids_limit: 500

  readarr:
    image: lscr.io/linuxserver/readarr:0.4.19-nightly@sha256:4f291128d1a5538be73c2a30473d7cdd0820e223dc8b8533b0cbc5659000dcbe
    networks:
      - homelab_net
    security_opt: ["no-new-privileges:true"]
    cap_drop: [ALL]
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ../data/readarr:/config
      - ${MEDIA_HDD_PATH:-/mnt/media-hdd}/Books:/books
      - ${MEDIA_NVME_PATH:-/mnt/media-nvme}/Incoming:/downloads
    labels:
      caddy: "${BASE_DOMAIN}"
      caddy.handle: "/readarr*"
      caddy.handle.0_reverse_proxy: "{{upstreams 8787}}"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8787/readarr/ping || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    logging: *default-logging
    pids_limit: 500

  overseerr:
    image: ghcr.io/seerr-team/seerr@sha256:c4cbd5121236ac2f70a843a0b920b68a27976be57917555f1c45b08a1e6b2aad
    init: true
    networks:
      - homelab_net
    security_opt: ["no-new-privileges:true"]
    cap_drop: [ALL]
    environment:
      - LOG_LEVEL=info
      - TZ=${TZ}
      - PORT=5055
    ports:
      - "127.0.0.1:5055:5055"
    volumes:
      - ../data/overseerr:/app/config
    labels:
      caddy: "${BASE_DOMAIN}"
      caddy.handle_path: "/overseerr*"
      caddy.handle_path.0_reverse_proxy: "{{upstreams 5055}}"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:5055/api/v1/settings/public >/dev/null || exit 1"]
      start_period: 40s
      timeout: 5s
      interval: 20s
      retries: 3
    restart: unless-stopped
    logging: *default-logging
    pids_limit: 500

  plex:
    image: lscr.io/linuxserver/plex@sha256:e5c7c283b242966416a4bed2d666acf6f3fb8f957c704be8333f8dc987364825
    # Intentional exception: keep host mode for discovery/casting compatibility.
    network_mode: host
    security_opt: ["no-new-privileges:true"]
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - VERSION=docker
      - NVIDIA_VISIBLE_DEVICES=${NVIDIA_VISIBLE_DEVICES:-all}
    gpus: all
    volumes:
      - ../data/plex:/config
      - ${MEDIA_HDD_PATH:-/mnt/media-hdd}:/mnt/media-hdd:ro
      - ${MEDIA_NVME_PATH:-/mnt/media-nvme}:/mnt/media-nvme:ro
      - ${PLEX_DATA_PATH:-/srv/plex}:/srv/plex
      - ${MEDIA_HDD_PATH:-/mnt/media-hdd}/Movies:/movies:ro
      - ${MEDIA_HDD_PATH:-/mnt/media-hdd}/TV:/tv:ro
      - ${MEDIA_NVME_PATH:-/mnt/media-nvme}/Incoming:/downloads
    labels:
      caddy: "plex.${BASE_DOMAIN}"
      caddy.reverse_proxy: "host.docker.internal:32400"
      caddy.tls.dns: cloudflare {env.CLOUDFLARE_TOKEN}
      caddy.header.Strict-Transport-Security: "max-age=31536000; includeSubDomains"
    group_add:
      - video
      - render
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:32400/identity || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    logging: *default-logging
    mem_limit: 8g
    pids_limit: 500

  jellyfin:
    image: lscr.io/linuxserver/jellyfin@sha256:ae1ac3d89b8598f31f5e1dc5aff898e13eab617303db58f84956e26f7b78c198
    # Intentional exception: keep host mode for discovery/casting compatibility.
    network_mode: host
    security_opt: ["no-new-privileges:true"]
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - JELLYFIN_PublishedServerUrl=https://jellyfin.${BASE_DOMAIN}
      - NVIDIA_VISIBLE_DEVICES=${NVIDIA_VISIBLE_DEVICES:-all}
    gpus: all
    volumes:
      - ../data/jellyfin:/config
      - ${MEDIA_HDD_PATH:-/mnt/media-hdd}/Movies:/movies:ro
      - ${MEDIA_HDD_PATH:-/mnt/media-hdd}/TV:/tv:ro
      - ${MEDIA_NVME_PATH:-/mnt/media-nvme}/Incoming:/downloads:ro
      - ${MEDIA_HDD_PATH:-/mnt/media-hdd}:/mnt/media-hdd:ro
      - ${MEDIA_NVME_PATH:-/mnt/media-nvme}:/mnt/media-nvme:ro
    labels:
      caddy: "jellyfin.${BASE_DOMAIN}"
      caddy.reverse_proxy: "host.docker.internal:8096"
      caddy.tls.dns: cloudflare {env.CLOUDFLARE_TOKEN}
      caddy.header.Strict-Transport-Security: "max-age=31536000; includeSubDomains"
    devices:
      - /dev/dri:/dev/dri
    group_add:
      - video
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8096/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    logging: *default-logging
    pids_limit: 500

  # VPN sidecar: all qBittorrent traffic exits through gluetun's WireGuard tunnel.
  # Fill VPN_SERVICE_PROVIDER, WIREGUARD_PRIVATE_KEY, etc. in .env before starting.
  gluetun:
    image: qmcgaw/gluetun:latest
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    networks:
      - homelab_net
    ports:
      - "51423:51423/tcp"
      - "51423:51423/udp"
    environment:
      - VPN_SERVICE_PROVIDER=${VPN_SERVICE_PROVIDER:-}
      - VPN_TYPE=${VPN_TYPE:-wireguard}
      - WIREGUARD_PRIVATE_KEY=${WIREGUARD_PRIVATE_KEY:-}
      - WIREGUARD_ADDRESSES=${WIREGUARD_ADDRESSES:-}
      - SERVER_COUNTRIES=${SERVER_COUNTRIES:-}
    labels:
      caddy: "${BASE_DOMAIN}"
      caddy.redir_0: "/qbittorrent /qbittorrent/"
      caddy.handle_path: "/qbittorrent/*"
      caddy.handle_path.0_reverse_proxy: "{{upstreams 8080}}"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging: *default-logging
    pids_limit: 200

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent@sha256:8f7a1da9644340c737e3211ecc910a416d4295076e6b2824a4afcd1f4e3576e2
    network_mode: "service:gluetun"
    security_opt: ["no-new-privileges:true"]
    cap_drop: [ALL]
    depends_on:
      - gluetun
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - WEBUI_PORT=8080
    volumes:
      - ../data/qbittorrent/config:/config
      - ../data/qbittorrent/torrent-trackers:/torrent-trackers
      - ${MEDIA_NVME_PATH:-/mnt/media-nvme}/Incoming:/downloads
      - ${MEDIA_HDD_PATH:-/mnt/media-hdd}/Movies:/movies
      - ${MEDIA_HDD_PATH:-/mnt/media-hdd}/TV:/tv
    mem_limit: 4g
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/api/v2/app/version || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    logging: *default-logging
    pids_limit: 200

  torrent-health-ui:
    build:
      context: ../src/homelab_workers
      # Pip during build needs working DNS; some runners break default bridge DNS.
      network: host
    image: local/homelab-workers:latest
    working_dir: /workspace
    networks:
      - homelab_net
    security_opt: ["no-new-privileges:true"]
    cap_drop: [ALL]
    environment:
      - TZ=${TZ}
      - TORRENT_HEALTH_UI_HOST=0.0.0.0
      - TORRENT_HEALTH_UI_PORT=8091
      - SONARR_URL=${SONARR_INTERNAL_URL:-http://sonarr:8989/sonarr}
      - SONARR_API_KEY=${SONARR_API_KEY:-}
      - RADARR_URL=${RADARR_INTERNAL_URL:-http://radarr:7878/radarr}
      - RADARR_API_KEY=${RADARR_API_KEY:-}
      - QBITTORRENT_URL=${QBITTORRENT_INTERNAL_URL:-http://qbittorrent:8080}
      - QBITTORRENT_USERNAME=${QBITTORRENT_USERNAME:-}
      - QBITTORRENT_PASSWORD=${QBITTORRENT_PASSWORD:-}
      - TORRENT_HEALTH_LOG_FILE=${TORRENT_HEALTH_LOG_FILE:-/workspace/data/torrent-health/health.log}
    volumes:
      - ../src/homelab_workers/src:/workspace/src/homelab_workers/src:ro
      - ../data/sonarr:/workspace/data/sonarr:ro
      - ../data/radarr:/workspace/data/radarr:ro
      - ../data/torrent-health:/workspace/data/torrent-health:ro
    command: >
      sh -c '
      PYTHONPATH=/workspace/src/homelab_workers/src python -m homelab_workers.torrent_health_ui.app
      '
    labels:
      caddy: "${BASE_DOMAIN}"
      caddy.handle_path: "/torrent-health*"
      caddy.handle_path.0_reverse_proxy: "{{upstreams 8091}}"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8091/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    logging: *default-logging
    pids_limit: 200

  # Thin API for OpenClaw: TV/movie metadata lookup (Sonarr/Radarr) with a stable JSON contract.
  media-agent:
    build:
      context: ../media-agent
      network: host
    image: local/media-agent:latest
    networks:
      - homelab_net
    security_opt: ["no-new-privileges:true"]
    cap_drop: [ALL]
    environment:
      - TZ=${TZ}
      - MEDIA_AGENT_TOKEN=${MEDIA_AGENT_TOKEN:-}
      - SONARR_URL=${SONARR_INTERNAL_URL:-http://sonarr:8989/sonarr}
      - SONARR_API_KEY=${SONARR_API_KEY:-}
      - RADARR_URL=${RADARR_INTERNAL_URL:-http://radarr:7878/radarr}
      - RADARR_API_KEY=${RADARR_API_KEY:-}
      - OLLAMA_URL=${OLLAMA_URL:-http://ollama:11434}
      - MEDIA_AGENT_ROUTER_MODEL=${MEDIA_AGENT_ROUTER_MODEL:-qwen2.5-coder:7b-instruct-q8_0}
      - MEDIA_AGENT_ROUTER_MAX_RETRIES=${MEDIA_AGENT_ROUTER_MAX_RETRIES:-3}
      # Direct Prowlarr (GET/POST /api/v1/search) — optional; enables indexer-search / indexer-grab
      - PROWLARR_URL=${PROWLARR_INTERNAL_URL:-http://prowlarr:9696}
      - PROWLARR_API_KEY=${PROWLARR_API_KEY:-}
      - QBITTORRENT_INTERNAL_URL=${QBITTORRENT_INTERNAL_URL:-http://qbittorrent:8080}
      - QBITTORRENT_USERNAME=${QBITTORRENT_USERNAME:-}
      - QBITTORRENT_PASSWORD=${QBITTORRENT_PASSWORD:-}
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import os,urllib.request; t=os.environ.get(\"MEDIA_AGENT_TOKEN\",\"\"); assert t; r=urllib.request.Request(\"http://127.0.0.1:8000/internal/media-agent/v1/health\", headers={\"Authorization\":\"Bearer \"+t}); urllib.request.urlopen(r, timeout=4).read()"',
        ]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging: *default-logging
    pids_limit: 200
