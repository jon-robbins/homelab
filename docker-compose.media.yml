services:
  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    networks:
      - homelab_net
    security_opt: ["no-new-privileges:true"]
    shm_size: "2gb"
    environment:
      - LOG_LEVEL=info
      - TZ=${TZ}
    restart: unless-stopped

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    networks:
      - homelab_net
    security_opt: ["no-new-privileges:true"]
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ./data/prowlarr:/config
    restart: unless-stopped

  jackett:
    image: lscr.io/linuxserver/jackett:latest
    container_name: jackett
    networks:
      - homelab_net
    security_opt: ["no-new-privileges:true"]
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ./data/jackett:/config
    restart: unless-stopped

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    networks:
      - homelab_net
    security_opt: ["no-new-privileges:true"]
    environment:
      - PUID=${PUID}
      - PGID=988
      - TZ=${TZ}
    volumes:
      - ./data/sonarr:/config
      - /mnt/media-hdd/TV:/tv
      - /mnt/media-nvme/Incoming:/downloads
    restart: unless-stopped

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    networks:
      - homelab_net
    security_opt: ["no-new-privileges:true"]
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ./data/radarr:/config
      - /mnt/media-hdd/Movies:/movies
      - /mnt/media-nvme/Incoming:/downloads
    restart: unless-stopped

  readarr:
    image: lscr.io/linuxserver/readarr:0.4.19-nightly
    container_name: readarr
    networks:
      - homelab_net
    security_opt: ["no-new-privileges:true"]
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ./data/readarr:/config
      - /mnt/media-hdd/Books:/books
      - /mnt/media-nvme/Incoming:/downloads
    restart: unless-stopped

  overseerr:
    image: ghcr.io/seerr-team/seerr:latest
    container_name: overseerr
    init: true
    networks:
      - homelab_net
    security_opt: ["no-new-privileges:true"]
    environment:
      - LOG_LEVEL=info
      - TZ=${TZ}
      - PORT=5055
    ports:
      - "127.0.0.1:5055:5055"
    volumes:
      - ./data/overseerr:/app/config
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:5055/api/v1/settings/public >/dev/null || exit 1"]
      start_period: 40s
      timeout: 5s
      interval: 20s
      retries: 3
    restart: unless-stopped

  plex:
    image: lscr.io/linuxserver/plex:latest
    container_name: plex
    # Intentional exception: keep host mode for discovery/casting compatibility.
    network_mode: host
    security_opt: ["no-new-privileges:true"]
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - VERSION=docker
      - NVIDIA_VISIBLE_DEVICES=all
    volumes:
      - ./data/plex:/config
      - /mnt/media-hdd:/mnt/media-hdd
      - /mnt/media-nvme:/mnt/media-nvme
      - /srv/plex:/srv/plex
      - /mnt/media-hdd/Movies:/movies
      - /mnt/media-hdd/TV:/tv
      - /mnt/media-nvme/Incoming:/downloads
    gpus: all
    group_add:
      - video
      - render
    restart: unless-stopped

  jellyfin:
    image: lscr.io/linuxserver/jellyfin:latest
    container_name: jellyfin
    # Intentional exception: keep host mode for discovery/casting compatibility.
    network_mode: host
    security_opt: ["no-new-privileges:true"]
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - NVIDIA_VISIBLE_DEVICES=all
      - JELLYFIN_PublishedServerUrl=https://jf.ashorkqueen.xyz
    volumes:
      - ./data/jellyfin:/config
      - /mnt/media-hdd/Movies:/movies:ro
      - /mnt/media-hdd/TV:/tv:ro
      - /mnt/media-nvme/Incoming:/downloads:ro
      - /mnt/media-hdd:/mnt/media-hdd:ro
      - /mnt/media-nvme:/mnt/media-nvme:ro
    devices:
      - /dev/dri:/dev/dri
    gpus: all
    group_add:
      - video
    restart: unless-stopped

  # qBittorrent on bridge network; ingress is via Caddy path routing.
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    networks:
      - homelab_net
    security_opt: ["no-new-privileges:true"]
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - WEBUI_PORT=8080
    ports:
      # Incoming peer connections (must match qBittorrent listening port).
      - "51423:51423/tcp"
      - "51423:51423/udp"
    volumes:
      - ./data/qbittorrent/config:/config
      - ./data/qbittorrent/torrent-trackers:/torrent-trackers
      - /mnt/media-nvme/Incoming:/downloads
      - /mnt/media-hdd/Movies:/movies
      - /mnt/media-hdd/TV:/tv
    restart: unless-stopped

  arr-retry-worker:
    image: python:3.12-alpine
    container_name: arr-retry-worker
    working_dir: /workspace
    networks:
      - homelab_net
    security_opt: ["no-new-privileges:true"]
    environment:
      - TZ=${TZ}
      - SONARR_URL=${SONARR_INTERNAL_URL:-http://sonarr:8989/sonarr}
      - SONARR_API_KEY=${SONARR_API_KEY:-}
      - RADARR_URL=${RADARR_INTERNAL_URL:-http://radarr:7878/radarr}
      - RADARR_API_KEY=${RADARR_API_KEY:-}
      - QBITTORRENT_URL=${QBITTORRENT_INTERNAL_URL:-http://qbittorrent:8080}
      - QBITTORRENT_USERNAME=${QBITTORRENT_USERNAME:-}
      - QBITTORRENT_PASSWORD=${QBITTORRENT_PASSWORD:-}
      - ARR_HEALTH_STATE_FILE=${ARR_HEALTH_STATE_FILE:-/workspace/data/arr-retry/health_state.json}
      # Stalled qBittorrent torrents in Sonarr category with no Sonarr queue row -> EpisodeSearch + remove torrent
      - ARR_RETRY_QBT_ORPHAN_STALLS=${ARR_RETRY_QBT_ORPHAN_STALLS:-true}
      - SONARR_QBT_CATEGORY=${SONARR_QBT_CATEGORY:-tv-sonarr}
      - ARR_RETRY_MAX_QB_ORPHANS=${ARR_RETRY_MAX_QB_ORPHANS:-10}
      - ARR_RETRY_QBT_ORPHAN_MIN_AGE_SECONDS=${ARR_RETRY_QBT_ORPHAN_MIN_AGE_SECONDS:-3600}
      # Missing monitored items with empty /release cache still get a search (Sonarr/Radarr)
      - ARR_RETRY_MISSING_EMPTY_RELEASE_SEARCH=${ARR_RETRY_MISSING_EMPTY_RELEASE_SEARCH:-true}
    volumes:
      - ./scripts:/workspace/scripts:ro
      - ./data/sonarr:/workspace/data/sonarr:ro
      - ./data/radarr:/workspace/data/radarr:ro
      - ./data/arr-retry:/workspace/data/arr-retry
    command: |
      sh -c '
        set -eu
        mkdir -p /workspace/data/arr-retry
        RETRY_CMD="cd /workspace && PYTHONPATH=/workspace/scripts/workers python -u /workspace/scripts/workers/retry-sonarr-stalled-downloads.py --apply --max-missing-checks 40 --max-searches 40 --http-timeout-seconds 30 --allow-force-grab-fallback --sonarr-config-path /workspace/data/sonarr/config.xml --radarr-config-path /workspace/data/radarr/config.xml"
        echo "[arr-retry-worker] $(date -Iseconds) running immediate startup sweep"
        sh -c "$$RETRY_CMD" 2>&1 | tee /workspace/data/arr-retry/health-last-run.log >> /proc/1/fd/1 &
        echo "[arr-retry-worker] $(date -Iseconds) startup sweep launched"
        printf "%s\n" "*/15 * * * * $$RETRY_CMD 2>&1 | tee /workspace/data/arr-retry/health-last-run.log >> /proc/1/fd/1" > /etc/crontabs/root
        echo "[arr-retry-worker] $(date -Iseconds) installed cron schedule: */15 * * * *"
        exec crond -f -l 8
      '
    restart: unless-stopped

  torrent-health-ui:
    image: python:3.12-alpine
    container_name: torrent-health-ui
    working_dir: /workspace
    networks:
      - homelab_net
    security_opt: ["no-new-privileges:true"]
    environment:
      - TZ=${TZ}
      - ARR_HEALTH_UI_HOST=0.0.0.0
      - ARR_HEALTH_UI_PORT=8091
      - SONARR_URL=${SONARR_INTERNAL_URL:-http://sonarr:8989/sonarr}
      - SONARR_API_KEY=${SONARR_API_KEY:-}
      - RADARR_URL=${RADARR_INTERNAL_URL:-http://radarr:7878/radarr}
      - RADARR_API_KEY=${RADARR_API_KEY:-}
      - QBITTORRENT_URL=${QBITTORRENT_INTERNAL_URL:-http://qbittorrent:8080}
      - QBITTORRENT_USERNAME=${QBITTORRENT_USERNAME:-}
      - QBITTORRENT_PASSWORD=${QBITTORRENT_PASSWORD:-}
      - ARR_HEALTH_LOG_FILE=${ARR_HEALTH_LOG_FILE:-/workspace/data/arr-retry/health-last-run.log}
    volumes:
      - ./scripts:/workspace/scripts:ro
      - ./data/sonarr:/workspace/data/sonarr:ro
      - ./data/radarr:/workspace/data/radarr:ro
      - ./data/arr-retry:/workspace/data/arr-retry:ro
    command: >
      sh -c '
      PYTHONPATH=/workspace/scripts/workers python /workspace/scripts/workers/torrent_health_ui/app.py
      '
    restart: unless-stopped

networks:
  homelab_net:
    external: true
    name: homelab_net
