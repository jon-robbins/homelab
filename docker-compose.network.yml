services:
  caddy:
    image: lucaslorentz/caddy-docker-proxy:latest
    container_name: caddy
    security_opt: ["no-new-privileges:true"]
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./data/caddy/data:/data
      - ./data/caddy/config:/config
    environment:
      - CADDY_INGRESS_NETWORKS=homelab_net
    networks:
      - homelab_net
    extra_hosts:
      - "host.docker.internal:host-gateway"

  pihole:
    image: pihole/pihole:latest
    container_name: pihole
    # Pi-hole needs to listen on DNS ports (53/tcp+udp). Host networking avoids
    # Docker port publishing edge-cases, but requires freeing port 53 on host.
    network_mode: host
    environment:
      - TZ=${TZ}
      # Pi-hole v6+: use FTLCONF_* variable names.
      - FTLCONF_webserver_api_password=${PIHOLE_WEBPASSWORD:-}
      - FTLCONF_dns_upstreams=${PIHOLE_DNS_:-1.1.1.1;1.0.0.1}
      # Caddy already owns :80 on this host, so run the admin UI on a high port.
      - FTLCONF_webserver_port=${PIHOLE_WEB_PORT:-8083}
      - FTLCONF_dns_listeningMode=all
    volumes:
      - ./data/pihole/etc-pihole:/etc/pihole
      - ./data/pihole/etc-dnsmasq.d:/etc/dnsmasq.d
    # Needed to bind to :53 when running as non-root.
    cap_add:
      - NET_BIND_SERVICE
      - NET_RAW
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:${PIHOLE_WEB_PORT:-8083}/admin/ >/dev/null || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 45s
    restart: unless-stopped
    labels:
      caddy: "pihole.${BASE_DOMAIN:-homelab.local}"
      caddy.reverse_proxy: "host.docker.internal:${PIHOLE_WEB_PORT:-8083}"

  dashy:
    image: lissy93/dashy:latest
    container_name: dashy
    networks:
      - homelab_net
    security_opt: ["no-new-privileges:true"]
    environment:
      - NODE_ENV=production
      - HOST=0.0.0.0
      - PORT=8082
    volumes:
      - ./data/dashy/conf.yml:/app/user-data/conf.yml
    labels:
      caddy: "${BASE_DOMAIN:-homelab.local}"
      caddy.handle_path: "/dashy*"
      caddy.handle_path.0_reverse_proxy: "{{upstreams 8082}}"
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    network_mode: host
    security_opt: ["no-new-privileges:true"]
    command: tunnel --no-autoupdate run
    volumes:
      - ./data/cloudflared/config.yml:/etc/cloudflared/config.yml:ro
      - ./data/cloudflared/credentials:/etc/cloudflared/credentials
    restart: unless-stopped

  tailscale:
    image: tailscale/tailscale:stable
    container_name: tailscale
    hostname: jon-server
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - ./data/tailscale:/var/lib/tailscale
    command: >
      tailscaled
      --state=/var/lib/tailscale/tailscaled.state
      --statedir=/var/lib/tailscale
      --socket=/tmp/tailscaled.sock
    restart: unless-stopped

networks:
  homelab_net:
    driver: bridge
    name: homelab_net
